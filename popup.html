<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn Job Quick Select</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <h1>LinkedIn Job Quick Select</h1>
    </div>

    <div class="content">
      <p class="description">Quickly select job descriptions on LinkedIn with your custom keyboard shortcut.</p>

      <button id="open-options" class="options-button">
        <span class="icon">⚙️</span>
        Open Settings
      </button>

      <div class="info">
        <p class="hint">Click settings to customize your keyboard shortcut</p>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
